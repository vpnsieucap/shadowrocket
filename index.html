<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPN Siêu Cấp - Trải Nghiệm Mạng Không Giới Hạn</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome (Thay thế thư viện cũ bị lỗi không hiển thị) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Thư viện đọc CSV -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
        }
        
        .app-container {
            width: 100%;
            max-width: 480px;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
            overflow-x: hidden;
        }

        .cyber-card {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(148, 163, 184, 0.1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            backdrop-filter: blur(12px);
        }
        
        .cyber-card:hover {
            border-color: rgba(99, 102, 241, 0.5);
            transform: translateY(-2px);
        }

        .copy-btn {
            background: rgba(56, 189, 248, 0.1);
            color: #38bdf8;
            border: 1px solid rgba(56, 189, 248, 0.2);
            transition: all 0.2s ease;
        }
        
        .copy-btn:hover {
            background: #38bdf8;
            color: #0f172a;
        }
        
        .copy-btn:active {
            transform: scale(0.95);
        }

        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="app-container p-6 pb-24 z-10 flex flex-col">
        
        <div class="glow-orb w-64 h-64 bg-blue-600/20 top-[-10%] left-[-20%]"></div>
        <div class="glow-orb w-48 h-48 bg-purple-600/20 top-[30%] right-[-10%]"></div>

        <!-- Header -->
        <header class="flex justify-between items-center mb-8 relative z-10">
            <div class="flex items-center gap-3">
                <div class="w-11 h-11 rounded-full bg-gradient-to-tr from-blue-500 to-indigo-500 flex justify-center items-center text-white shadow-lg shadow-blue-500/30">
                    <i class="fa-solid fa-bolt text-xl"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold text-white tracking-wide">VPN<span class="font-light text-blue-400">SiêuCấp</span></h1>
                </div>
            </div>
            <a href="#" class="text-sm flex items-center gap-1.5 text-gray-400 hover:text-white transition-colors">
                <i class="fa-solid fa-circle-info"></i> HD
            </a>
        </header>

        <!-- Stats / Dashboard Area -->
        <div class="mb-8 relative z-10">
            <h2 class="text-sm font-semibold text-gray-400 uppercase tracking-widest mb-3">Tổng quan hệ thống</h2>
            <div class="grid grid-cols-2 gap-4">
                <div class="cyber-card rounded-2xl p-4">
                    <div class="flex items-center gap-2 text-gray-400 mb-1">
                        <i class="fa-solid fa-hard-drive"></i>
                        <span class="text-xs">Tài khoản</span>
                    </div>
                    <p class="text-3xl font-bold text-white" id="total-accs">0</p>
                </div>
                <div class="cyber-card rounded-2xl p-4">
                    <div class="flex items-center gap-2 text-gray-400 mb-1">
                        <i class="fa-solid fa-chart-line"></i>
                        <span class="text-xs">Trạng thái</span>
                    </div>
                    <div class="flex items-center gap-2 mt-1">
                        <span class="relative flex h-3 w-3">
                          <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                          <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                        </span>
                        <span class="text-lg font-semibold text-green-400">Live</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Thanh tìm kiếm -->
        <div class="relative mb-6 z-10">
            <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
            <input type="text" id="searchInput" placeholder="Tìm kiếm Email..." 
                class="w-full bg-slate-800/60 border border-slate-700 text-white text-sm rounded-xl py-3.5 pl-11 pr-4 outline-none focus:border-blue-500 focus:bg-slate-800 transition-all placeholder-gray-500 backdrop-blur-md shadow-inner">
        </div>

        <!-- Danh sách tài khoản -->
        <div class="flex items-center justify-between mb-4 z-10">
            <h3 class="text-sm font-semibold text-gray-300">Danh sách Premium</h3>
            <button onclick="loadAccounts()" class="text-blue-400 hover:text-white p-2 rounded-full hover:bg-slate-800 transition-colors flex items-center justify-center">
                <i class="fa-solid fa-rotate-right" id="refresh-icon"></i>
            </button>
        </div>

        <div id="accountList" class="flex flex-col gap-4 z-10 relative">
            <!-- Loading -->
            <div id="loadingState" class="py-16 text-center text-gray-500 flex flex-col items-center">
                <i class="fa-solid fa-circle-notch fa-spin text-3xl mb-4 text-blue-500"></i>
                <p class="text-sm">Đang đồng bộ dữ liệu an toàn...</p>
            </div>
        </div>

    </div>

    <script>
                // ⚠️ LINK GOOGLE SHEETS CHUẨN CỦA BẠN ĐÂY:
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/109A_qx7OfrCmUq1yzuGkzmdboLWkfBRg-rZx5s_UU9Y/export?format=csv';

        async function loadAccounts() {
            const container = document.getElementById('accountList');
            const refreshIcon = document.getElementById('refresh-icon');
            refreshIcon.classList.add('fa-spin'); 
            
            try {
                // Đã xóa phần bắt lỗi cũ, giờ code sẽ chạy thẳng luôn
                if(SHEET_URL.trim() === '') {
                    setTimeout(() => {
                        renderMockData();
                        refreshIcon.classList.remove('fa-spin');
                    }, 800);
                    return;
                }

                const response = await fetch(SHEET_URL);
                const csvData = await response.text();

                
                Papa.parse(csvData, {
                    header: true,
                    skipEmptyLines: true,
                    complete: function(results) {
                        const rows = results.data;
                        container.innerHTML = '';
                        refreshIcon.classList.remove('fa-spin');
                        
                        if(rows.length === 0) {
                            renderEmptyState();
                            return;
                        }

                        document.getElementById('total-accs').textContent = rows.length;
                        
                        rows.forEach((row, index) => {
                            const status = row.Status || 'Active';
                            const email = row.Email || '';
                            const password = row.Password || '';
                            const statusColor = status.toLowerCase().includes('die') || status.toLowerCase().includes('lỗi') || status.toLowerCase().includes('bảo trì') 
                                ? 'text-rose-400 bg-rose-400/10 border-rose-400/20' 
                                : 'text-emerald-400 bg-emerald-400/10 border-emerald-400/20';

                            const cardHtml = `
                                <div class="account-card cyber-card rounded-2xl p-5 transition-all duration-300">
                                    <div class="flex justify-between items-start mb-4">
                                        <div class="flex items-center gap-2.5">
                                            <div class="w-9 h-9 rounded-xl bg-slate-800 border border-slate-700 flex justify-center items-center shadow-inner">
                                                <i class="fa-solid fa-shield-halved text-blue-400"></i>
                                            </div>
                                            <div>
                                                <p class="text-[11px] text-gray-400 uppercase tracking-wider mb-0.5">Tài khoản</p>
                                                <p class="text-sm font-semibold text-white">#${index + 1}</p>
                                            </div>
                                        </div>
                                        <span class="text-[10px] font-bold px-2.5 py-1 rounded border uppercase tracking-wider ${statusColor}">${status}</span>
                                    </div>
                                    
                                    <div class="space-y-3">
                                        <div class="group flex items-center justify-between bg-slate-800/50 border border-slate-700/50 p-3 rounded-xl hover:bg-slate-700/50 transition-colors">
                                            <div class="overflow-hidden mr-2">
                                                <p class="text-gray-200 text-sm font-medium truncate account-email">${email}</p>
                                            </div>
                                            <button onclick="copyText('${email}', this)" class="copy-btn w-9 h-9 rounded-lg flex justify-center items-center shrink-0">
                                                <i class="fa-regular fa-copy text-sm"></i>
                                            </button>
                                        </div>
                                        <div class="group flex items-center justify-between bg-slate-800/50 border border-slate-700/50 p-3 rounded-xl hover:bg-slate-700/50 transition-colors">
                                            <div class="overflow-hidden mr-2">
                                                <p class="text-gray-400 text-sm font-mono truncate tracking-wider">${password}</p>
                                            </div>
                                            <button onclick="copyText('${password}', this)" class="copy-btn w-9 h-9 rounded-lg flex justify-center items-center shrink-0">
                                                <i class="fa-regular fa-copy text-sm"></i>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            `;
                            container.insertAdjacentHTML('beforeend', cardHtml);
                        });
                        
                        setupSearch();
                    }
                });
            } catch (error) {
                console.error("Lỗi:", error);
                renderEmptyState();
                refreshIcon.classList.remove('fa-spin');
            }
        }

        function copyText(text, btnElement) {
            navigator.clipboard.writeText(text);
            const icon = btnElement.querySelector('i');
            const originalClass = icon.className;
            
            icon.className = 'fa-solid fa-check text-green-400 text-lg';
            
            setTimeout(() => {
                icon.className = originalClass;
            }, 2000);
        }

        function renderEmptyState() {
            document.getElementById('accountList').innerHTML = `
                <div class="py-12 flex flex-col items-center justify-center text-center border border-dashed border-slate-700 rounded-2xl bg-slate-800/20">
                    <div class="w-16 h-16 bg-slate-800 rounded-full flex items-center justify-center mb-4 shadow-inner">
                        <i class="fa-solid fa-database text-2xl text-gray-500"></i>
                    </div>
                    <h3 class="text-white font-medium mb-1">Không có dữ liệu</h3>
                    <p class="text-sm text-gray-500 px-6">Hãy kiểm tra lại đường link Google Sheets.</p>
                </div>
            `;
            document.getElementById('total-accs').textContent = '0';
        }

        function renderMockData() {
            document.getElementById('total-accs').textContent = '2';
            const mockContainer = document.getElementById('accountList');
            mockContainer.innerHTML = `
                <!-- Demo Acc 1 -->
                <div class="account-card cyber-card rounded-2xl p-5 transition-all duration-300">
                    <div class="flex justify-between items-start mb-4">
                        <div class="flex items-center gap-2.5">
                            <div class="w-9 h-9 rounded-xl bg-slate-800 border border-slate-700 flex justify-center items-center shadow-inner">
                                <i class="fa-solid fa-shield-halved text-blue-400"></i>
                            </div>
                            <div>
                                <p class="text-[11px] text-gray-400 uppercase tracking-wider mb-0.5">Tài khoản</p>
                                <p class="text-sm font-semibold text-white">#1</p>
                            </div>
                        </div>
                        <span class="text-[10px] font-bold px-2.5 py-1 rounded border uppercase tracking-wider text-emerald-400 bg-emerald-400/10 border-emerald-400/20">Active</span>
                    </div>
                    <div class="space-y-3">
                        <div class="group flex items-center justify-between bg-slate-800/50 border border-slate-700/50 p-3 rounded-xl hover:bg-slate-700/50 transition-colors">
                            <div class="overflow-hidden mr-2">
                                <p class="text-gray-200 text-sm font-medium truncate account-email">admin_vip@vpnsieucap.shop</p>
                            </div>
                            <button onclick="copyText('admin_vip@vpnsieucap.shop', this)" class="copy-btn w-9 h-9 rounded-lg flex justify-center items-center shrink-0">
                                <i class="fa-regular fa-copy text-sm"></i>
                            </button>
                        </div>
                        <div class="group flex items-center justify-between bg-slate-800/50 border border-slate-700/50 p-3 rounded-xl hover:bg-slate-700/50 transition-colors">
                            <div class="overflow-hidden mr-2">
                                <p class="text-gray-400 text-sm font-mono truncate tracking-wider">SuperAdmin2026@!</p>
                            </div>
                            <button onclick="copyText('SuperAdmin2026@!', this)" class="copy-btn w-9 h-9 rounded-lg flex justify-center items-center shrink-0">
                                <i class="fa-regular fa-copy text-sm"></i>
                            </button>
                        </div>
                    </div>
                </div>
                <!-- Demo Acc 2 -->
                <div class="account-card cyber-card rounded-2xl p-5 transition-all duration-300">
                    <div class="flex justify-between items-start mb-4">
                        <div class="flex items-center gap-2.5">
                            <div class="w-9 h-9 rounded-xl bg-slate-800 border border-slate-700 flex justify-center items-center shadow-inner">
                                <i class="fa-solid fa-shield-halved text-blue-400"></i>
                            </div>
                            <div>
                                <p class="text-[11px] text-gray-400 uppercase tracking-wider mb-0.5">Tài khoản</p>
                                <p class="text-sm font-semibold text-white">#2</p>
                            </div>
                        </div>
                        <span class="text-[10px] font-bold px-2.5 py-1 rounded border uppercase tracking-wider text-rose-400 bg-rose-400/10 border-rose-400/20">Bảo trì</span>
                    </div>
                    <div class="space-y-3">
                        <div class="group flex items-center justify-between bg-slate-800/50 border border-slate-700/50 p-3 rounded-xl hover:bg-slate-700/50 transition-colors">
                            <div class="overflow-hidden mr-2">
                                <p class="text-gray-200 text-sm font-medium truncate account-email">user_test@vpnsieucap.shop</p>
                            </div>
                            <button onclick="copyText('user_test@vpnsieucap.shop', this)" class="copy-btn w-9 h-9 rounded-lg flex justify-center items-center shrink-0">
                                <i class="fa-regular fa-copy text-sm"></i>
                            </button>
                        </div>
                        <div class="group flex items-center justify-between bg-slate-800/50 border border-slate-700/50 p-3 rounded-xl hover:bg-slate-700/50 transition-colors">
                            <div class="overflow-hidden mr-2">
                                <p class="text-gray-400 text-sm font-mono truncate tracking-wider">TestPassword123</p>
                            </div>
                            <button onclick="copyText('TestPassword123', this)" class="copy-btn w-9 h-9 rounded-lg flex justify-center items-center shrink-0">
                                <i class="fa-regular fa-copy text-sm"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `;
            setupSearch();
        }

        function setupSearch() {
            const searchInput = document.getElementById('searchInput');
            const cards = document.querySelectorAll('.account-card');

            searchInput.addEventListener('input', function(e) {
                const searchTerm = e.target.value.toLowerCase().trim();
                cards.forEach(card => {
                    const emailText = card.querySelector('.account-email').textContent.toLowerCase();
                    card.style.display = emailText.includes(searchTerm) ? 'block' : 'none';
                });
            });
        }

        window.onload = loadAccounts;
    </script>
</body>
</html>
