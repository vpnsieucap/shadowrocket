<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPN Siêu Cấp - vpnsieucap.shop</title>
    <!-- Tailwind CSS để tạo giao diện nhanh -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome cho các icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            /* Tạo màu nền gradient mềm mại giống ảnh */
            background: linear-gradient(180deg, #e0e7ff 0%, #f3e8ff 40%, #fce7f3 100%);
            min-height: 100vh;
        }
        /* Hiệu ứng kính mờ (Glassmorphism) */
        .glass-panel {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }
        /* Chữ gradient */
        .text-gradient {
            background: linear-gradient(90deg, #4f46e5 0%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="text-gray-800 antialiased selection:bg-purple-200">

    <!-- Container giới hạn chiều rộng để giống giao diện mobile -->
    <div class="max-w-md mx-auto relative pt-6 px-5 pb-20 min-h-screen flex flex-col">

        <!-- Header -->
        <header class="flex justify-between items-center mb-10">
            <div class="flex items-center gap-3">
                <!-- Logo -->
                <div class="w-12 h-12 bg-gray-900 rounded-xl flex items-center justify-center text-white shadow-lg">
                    <i class="fa-solid fa-shield-halved text-2xl"></i>
                </div>
                <div>
                    <h1 class="font-bold text-gray-900 text-lg leading-tight">VPN Siêu Cấp</h1>
                    <div class="flex items-center gap-1.5 mt-0.5">
                        <span class="w-2.5 h-2.5 bg-green-500 rounded-full animate-pulse"></span>
                        <span class="text-xs font-semibold text-gray-500 tracking-wider">ONLINE</span>
                    </div>
                </div>
            </div>
            
            <!-- Nút Hướng dẫn -->
            <button class="glass-panel px-4 py-2.5 rounded-full flex items-center gap-2 hover:bg-white/60 transition shadow-sm text-sm font-semibold text-gray-700">
                <i class="fa-solid fa-book-open text-blue-500"></i>
                Hướng dẫn
            </button>
        </header>

        <!-- Main Title Area -->
        <div class="text-center mb-6">
            <span class="inline-block bg-white/70 text-blue-600 text-xs font-bold px-4 py-1.5 rounded-full tracking-wider shadow-sm mb-4">
                PREMIUM ACCOUNTS
            </span>
            <h2 class="text-4xl font-extrabold text-gradient tracking-tight">VPN Siêu Cấp</h2>
        </div>

        <!-- Info Card -->
        <div class="glass-panel rounded-3xl p-6 mb-8 shadow-sm text-center relative overflow-hidden">
            <!-- Hiệu ứng ánh sáng nhỏ trong thẻ -->
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-white to-transparent opacity-50"></div>
            
            <p class="text-gray-600 text-sm font-medium mb-1 uppercase tracking-wide">Hệ thống VPN Chất lượng</p>
            <p class="text-gray-800 font-bold text-lg mb-5">VPNSIEUCAP.SHOP</p>
            
            <div class="flex justify-center items-center gap-6 text-sm text-gray-500 font-medium">
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-rotate text-blue-400"></i>
                    <span>Auto Update: <span class="text-gray-700">10s</span></span>
                </div>
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-users text-purple-400"></i>
                    <span>Total: <span class="text-gray-700">0</span></span>
                </div>
            </div>
        </div>

        <!-- Search Bar -->
        <div class="bg-white rounded-2xl p-2 flex items-center shadow-md shadow-purple-900/5 mb-16 border border-gray-100">
            <div class="pl-4 pr-3 text-gray-400">
                <i class="fa-solid fa-magnifying-glass text-lg"></i>
            </div>
            <input type="text" placeholder="Tìm kiếm quốc gia, server..." class="flex-1 bg-transparent border-none outline-none text-gray-700 placeholder-gray-400 font-medium py-3">
            <button class="w-12 h-12 bg-gray-50 hover:bg-gray-100 rounded-xl flex items-center justify-center text-gray-500 transition border border-gray-100">
                <i class="fa-solid fa-rotate"></i>
            </button>
        </div>

        <!-- Empty State (Chưa có dữ liệu) -->
        <div class="flex-1 flex flex-col items-center justify-center mt-4">
            <!-- Icon Ghost giống ảnh -->
            <div class="w-20 h-20 bg-white/60 rounded-3xl flex items-center justify-center shadow-sm mb-4 border border-white">
                <i class="fa-solid fa-ghost text-4xl text-gray-300"></i>
            </div>
            <h3 class="text-xl font-bold text-gray-800 mb-2">Chưa có dữ liệu</h3>
            <p class="text-gray-500 text-sm text-center px-8">Hệ thống đang cập nhật hoặc kết nối gián đoạn. Vui lòng thử lại sau.</p>
        </div>

    </div>

</body>
</html>
